identity:
  name: atlas
model: synthetic-small
required_skills:
  - research
  - reporter
tools:
  allow:
    - browser
    - files
  shell: sandboxed
  privileged_isolation: true
mcp:
  servers:
    search:
      command: npx
      args:
        - -y
        - synthetic-search
      env:
        SEARCH_API_KEY: placeholder
channels:
  telegram:
    enabled: true
    kind: chat
  email:
    enabled: true
    kind: mail
